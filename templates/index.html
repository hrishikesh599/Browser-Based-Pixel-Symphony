<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Macondo</title>

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body,
    #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      touch-action: none;

      background:
        radial-gradient(
          circle at center,
          #12071f 0%,
          #05010a 45%,
          #000000 100%
        );

      font-family: "Montserrat", sans-serif;
    }

    #canvas {
      position: fixed;
      inset: 0;

      overflow: hidden;

      filter:
        blur(0.3px)
        contrast(1.2)
        saturate(1.2);
    }

    .hero {
      position: relative;
      z-index: 2;

      width: 100%;
      height: 100%;

      display: flex;
      align-items: center;
      justify-content: center;

      pointer-events: none;
    }

    h1 {
      color: rgba(255,255,255,0.07);

      font-size: 90px;
      font-weight: 700;

      letter-spacing: 10px;
      text-transform: uppercase;

      user-select: none;

      text-shadow:
        0 0 20px rgba(180,120,255,0.15),
        0 0 60px rgba(120,80,255,0.08),
        0 0 120px rgba(120,80,255,0.05);
    }

  </style>
</head>

<body>

  <div id="app">

    <canvas id="canvas"></canvas>

    <div class="hero">
      <h1>MACONDO</h1>
    </div>

  </div>

  <script type="module">

    import TubesCursor from "/static/tubes1.min.js"
    
    const app = TubesCursor(
      document.getElementById('canvas'),
      {

        speed: 1.4,

        tubes: {

          count: 5,

          radius: 10,

          sides: 16,

          depth: 1.6,

          colors: [
            "#b026ff",
            "#7b2cff",
            "#5a3cff",
            "#8f6bff"
          ],

          lights: {

            intensity: 260,

            colors: [
              "#d580ff",
              "#8c52ff",
              "#5f7dff",
              "#ffffff"
            ]
          }
        }
      }
    )

    // FIX INFINITE SWIRL WHEN CURSOR LEAVES PAGE
    document.addEventListener('mouseleave', () => {

      if (app.uniforms?.velocity?.value) {

        app.uniforms.velocity.value.x = 0
        app.uniforms.velocity.value.y = 0
      }
    })

  </script>

</body>
</html>
